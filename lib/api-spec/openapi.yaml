openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Speed dating chatroom API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rooms
    description: Speed dating room operations
  - name: users
    description: User and matchmaking operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user with quiz answers as personality vector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/looking:
    get:
      operationId: listLookingUsers
      tags: [users]
      summary: List all users currently in the looking pool
      responses:
        "200":
          description: Users in looking pool
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /users/{id}/status:
    put:
      operationId: updateUserStatus
      tags: [users]
      summary: Update a user's status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rooms:
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a new speed dating room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/match:
    post:
      operationId: matchRoom
      tags: [rooms]
      summary: Auto-match a chooser with the top 5 compatible suitors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        "201":
          description: Room created and suitors matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchResult"
        "409":
          description: Not enough suitors in pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotEnoughSuitors"

  /rooms/active:
    get:
      operationId: listActiveRooms
      tags: [rooms]
      summary: List joinable rooms waiting for participants
      responses:
        "200":
          description: Active rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"

  /rooms/{id}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get room details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Room not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rooms/{id}/join:
    post:
      operationId: joinRoom
      tags: [rooms]
      summary: Join a room as chooser or suitor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinInput"
      responses:
        "200":
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinResult"
        "400":
          description: Room full or invalid role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Room not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rooms/{id}/messages:
    get:
      operationId: getRoomMessages
      tags: [rooms]
      summary: Get message history for the chooser's view (all suitor chats)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All messages grouped by suitor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /rooms/{id}/choose:
    post:
      operationId: chooseWinner
      tags: [rooms]
      summary: Chooser picks their favourite suitor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChooseInput"
      responses:
        "200":
          description: Winner chosen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Room not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UserProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [chooser, suitor]
        status:
          type: string
          enum: [looking, matched, in_room]
        createdAt:
          type: string
        cooldown:
          type: boolean
          description: "True when this Clerk user has hit their daily chooser session limit"
        cooldownEndsAt:
          type: ["string", "null"]
          description: "ISO timestamp when the daily cooldown resets (midnight UTC)"
        sessionsToday:
          type: integer
          description: "Number of chooser sessions used today"
        chooserDailyLimit:
          type: integer
          description: "Maximum chooser sessions allowed per day"
      required:
        - id
        - name
        - role
        - status
        - createdAt

    CreateUserInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        role:
          type: string
          enum: [chooser, suitor]
        personalityVector:
          type: array
          items:
            type: number
          minItems: 7
          maxItems: 7
      required:
        - name
        - role
        - personalityVector

    UpdateUserStatusInput:
      type: object
      properties:
        status:
          type: string
          enum: [looking, matched, in_room]
      required:
        - status

    MatchInput:
      type: object
      properties:
        chooserUserId:
          type: string
      required:
        - chooserUserId

    MatchResult:
      allOf:
        - $ref: "#/components/schemas/Room"
        - type: object
          properties:
            chooserParticipantId:
              type: string
          required:
            - chooserParticipantId

    NotEnoughSuitors:
      type: object
      properties:
        error:
          type: string
        count:
          type: integer
      required:
        - error
        - count

    Participant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [chooser, suitor]
        suitorSlot:
          type: ["integer", "null"]
        isBot:
          type: boolean
          description: "True when this participant slot is an AI bot contestant"
      required:
        - id
        - name
        - role
        - suitorSlot
        - isBot

    Room:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        status:
          type: string
          enum: [waiting, active, ended]
        chooserName:
          type: ["string", "null"]
        suitorCount:
          type: integer
        maxSuitors:
          type: integer
        currentRound:
          type: integer
          description: "Current round (1-4). Rounds 1-3: 1 question/suitor then eliminate. Round 4: 3 questions/suitor then choose winner."
        eliminatedParticipants:
          type: array
          items:
            type: string
          description: "Array of participant IDs who have been eliminated"
        winnerId:
          type: ["string", "null"]
        winnerName:
          type: ["string", "null"]
        participants:
          type: array
          items:
            $ref: "#/components/schemas/Participant"
        createdAt:
          type: string
      required:
        - id
        - code
        - status
        - chooserName
        - suitorCount
        - maxSuitors
        - currentRound
        - eliminatedParticipants
        - winnerId
        - winnerName
        - participants
        - createdAt

    Message:
      type: object
      properties:
        id:
          type: string
        roomId:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        senderRole:
          type: string
          enum: [chooser, suitor]
        suitorSlot:
          type: ["integer", "null"]
        round:
          type: ["integer", "null"]
          description: "Which speed-dating round this message belongs to"
        content:
          type: string
        createdAt:
          type: string
      required:
        - id
        - roomId
        - senderId
        - senderName
        - senderRole
        - suitorSlot
        - round
        - content
        - createdAt

    RoomInput:
      type: object
      properties:
        chooserName:
          type: string
          minLength: 1
      required:
        - chooserName

    JoinInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        role:
          type: string
          enum: [chooser, suitor]
      required:
        - name
        - role

    JoinResult:
      type: object
      properties:
        participantId:
          type: string
        room:
          $ref: "#/components/schemas/Room"
      required:
        - participantId
        - room

    ChooseInput:
      type: object
      properties:
        winnerId:
          type: string
      required:
        - winnerId

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
