kind = "mobile"
previewPath = "/mobile/"
title = "FlirtFest Mobile"
version = "1.0.0"
id = "artifacts/flirtfest-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24384

[services.development]
run = "pnpm --filter @workspace/flirtfest-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flirtfest-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/flirtfest-mobile", "run", "serve" ]

[services.env]
PORT = "24384"
BASE_PATH = "/mobile/"
