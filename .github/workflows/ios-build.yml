name: iOS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: false
        default: production
        type: choice
        options:
          - production

concurrency:
  group: eas-mobile-build
  cancel-in-progress: false

jobs:
  build:
    name: Build iOS (EAS)
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    defaults:
      run:
        working-directory: artifacts/flirtfest-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: artifacts/flirtfest-mobile/package.json

      - name: Install EAS CLI
        run: npm install --global eas-cli@latest

      - name: Read app version
        id: app_version
        run: |
          VERSION=$(node -e "const a=require('./app.json'); console.log(a.expo.version);")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build iOS
        id: build
        run: |
          set -o pipefail
          eas build \
            --platform ios \
            --profile "${{ inputs.profile || 'production' }}" \
            --non-interactive \
            --json 2>&1 | tee /tmp/eas-build-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          BUILD_URL=$(grep -oE 'https://expo\.dev/accounts/[^[:space:]"]+' /tmp/eas-build-output.txt | head -1 || true)
          if [ -z "$BUILD_URL" ]; then
            BUILD_ID=$(node -e "
              const fs = require('fs');
              try {
                const raw = fs.readFileSync('/tmp/eas-build-output.txt', 'utf8');
                const jsonMatch = raw.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
                if (jsonMatch) {
                  const parsed = JSON.parse(jsonMatch[0]);
                  const builds = Array.isArray(parsed) ? parsed : [parsed];
                  process.stdout.write(builds[0]?.id ?? '');
                }
              } catch {}
            " 2>/dev/null || true)
            if [ -n "$BUILD_ID" ]; then
              BUILD_URL="https://expo.dev/accounts/intermingled/projects/intermingled/builds/$BUILD_ID"
            fi
          fi

          if [ -z "$BUILD_URL" ]; then
            BUILD_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Capture build URL and error on failure
        id: build_failure
        if: failure() || cancelled()
        run: |
          # extract-build-url.sh resolves the EAS build URL from tee'd CLI output.
          # When /tmp/eas-build-output.txt is empty or contains no expo.dev link —
          # e.g. the CLI crashed, timed out, or failed auth before the build was
          # queued — the script falls back to the GitHub Actions run URL supplied
          # via FALLBACK_URL.  This guarantees build_url is never empty so that the
          # "Notify Slack — failure" step always links somewhere actionable.
          #
          # Fallback behavior is validated by:
          #   .github/scripts/test-build-url-fallback.sh  (Scenarios 8–10: iOS-specific)
          #   .github/workflows/build-url-fallback-test.yml  (CI gate on every change)
          EAS_OUTPUT_FILE=/tmp/eas-build-output.txt \
          FALLBACK_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          bash "$GITHUB_WORKSPACE/.github/scripts/extract-build-url.sh"

          # 1. Try to extract a structured error message from the EAS JSON output.
          #    EAS --json produces an object/array with an `error` or `errors` field
          #    for credential failures, Xcode/simulator exits, and similar issues that
          #    don't print a clear "Error:" line to stdout.
          ERROR_SUMMARY=$(node -e "
            const fs = require('fs');
            try {
              const raw = fs.readFileSync('/tmp/eas-build-output.txt', 'utf8');
              const jsonMatch = raw.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
              if (!jsonMatch) process.exit(1);
              const parsed = JSON.parse(jsonMatch[0]);
              const builds = Array.isArray(parsed) ? parsed : [parsed];
              const build = builds[0] || {};
              const msg =
                (build.error && typeof build.error === 'object' ? build.error.message : build.error) ||
                (build.errors && build.errors[0] && typeof build.errors[0] === 'object'
                  ? build.errors[0].message
                  : build.errors && build.errors[0]) ||
                null;
              if (msg && String(msg).trim()) {
                process.stdout.write(String(msg).trim().slice(0, 500));
                process.exit(0);
              }
            } catch {}
            process.exit(1);
          " 2>/dev/null || true)

          # 2. Fall back to grep for error-like lines in the raw output.
          if [ -z "$ERROR_SUMMARY" ]; then
            ERROR_SUMMARY=$(grep -iE '(error|failed|fatal|exception)' /tmp/eas-build-output.txt \
              | grep -v '^[[:space:]]*$' \
              | tail -10 \
              | sed 's/[[:cntrl:]]//g' \
              | head -c 500 || true)
          fi

          # 3. Fall back to the last 10 lines of raw output.
          if [ -z "$ERROR_SUMMARY" ]; then
            ERROR_SUMMARY=$(tail -10 /tmp/eas-build-output.txt | sed 's/[[:cntrl:]]//g' | head -c 500 || true)
          fi

          # 4. Last-resort generic message.
          if [ -z "$ERROR_SUMMARY" ]; then
            ERROR_SUMMARY="See the EAS build page or Actions run for details."
          fi
          printf 'error_summary=%s\n' "$ERROR_SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Trigger iOS Submit workflow
        if: success()
        run: |
          gh workflow run ios-submit.yml \
            --ref "${{ github.ref }}" \
            --field profile="${{ inputs.profile || 'production' }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack — success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":white_check_mark: *iOS build succeeded* — submit workflow triggered",
              "attachments": [
                {
                  "color": "#36a64f",
                  "fields": [
                    { "title": "App", "value": "Intermingled (`com.intermingled.app`)", "short": false },
                    { "title": "Version", "value": "${{ steps.app_version.outputs.version }}", "short": true },
                    { "title": "Profile", "value": "${{ inputs.profile || 'production' }}", "short": true },
                    { "title": "EAS Build", "value": "<${{ steps.build.outputs.build_url }}|View build>", "short": true },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": true }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — failure
        if: failure() || cancelled()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":x: *iOS build failed* — release pipeline blocked",
              "attachments": [
                {
                  "color": "#e01e5a",
                  "text": "${{ steps.build_failure.outputs.error_summary }}",
                  "fields": [
                    { "title": "App", "value": "Intermingled (`com.intermingled.app`)", "short": false },
                    { "title": "Version", "value": "${{ steps.app_version.outputs.version }}", "short": true },
                    { "title": "Profile", "value": "${{ inputs.profile || 'production' }}", "short": true },
                    { "title": "EAS Build", "value": "<${{ steps.build_failure.outputs.build_url }}|View build>", "short": true },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": true }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
