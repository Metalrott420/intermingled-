kind = "web"
previewPath = "/"
title = "Intermingled"
version = "1.0.0"
id = "artifacts/speed-date"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24906

[services.development]
run = "pnpm --filter @workspace/speed-date run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/speed-date", "run", "build" ]
publicDir = "artifacts/speed-date/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24906"
BASE_PATH = "/"
