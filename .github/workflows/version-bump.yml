name: Version Bump & Release

# Pushes a v* tag which triggers android-build.yml and ios-build.yml.
#
# IMPORTANT — token requirement:
#   Tag pushes made with the default GITHUB_TOKEN are intentionally blocked by
#   GitHub from firing downstream tag-based workflows.  You must create a
#   Personal Access Token (classic, repo scope) and store it as the repository
#   secret RELEASE_PAT.  If that secret is absent the workflow will fail fast
#   with a clear message rather than silently pushing a tag that never triggers
#   a build.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: >
          Semver bump type.
          'patch' increments the third number (1.0.1 → 1.0.2),
          'minor' the second (1.0.1 → 1.1.0),
          'major' the first (1.0.1 → 2.0.0).
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    name: Bump version and push tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Verify RELEASE_PAT is configured
        run: |
          if [ -z "${{ secrets.RELEASE_PAT }}" ]; then
            echo "::error::RELEASE_PAT secret is not set."
            echo "::error::A Personal Access Token with 'repo' scope is required so the v* tag"
            echo "::error::push triggers downstream android-build.yml / ios-build.yml workflows."
            echo "::error::Create a PAT at GitHub → Settings → Developer settings → Personal access tokens"
            echo "::error::then add it as a repository secret named RELEASE_PAT."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        working-directory: artifacts/flirtfest-mobile
        run: |
          OLD=$(node -e "const a=require('./app.json'); process.stdout.write(a.expo.version);")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="$MAJOR.$MINOR.$PATCH"
          node - <<EOF
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          app.expo.version = '$NEW';
          app.expo.ios = app.expo.ios || {};
          app.expo.android = app.expo.android || {};
          // iOS buildNumber mirrors the semver string
          app.expo.ios.buildNumber = '$NEW';
          // versionCode must be a strictly increasing integer for Google Play
          app.expo.android.versionCode = (app.expo.android.versionCode || 0) + 1;
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          console.log('app.json updated: version =', app.expo.version,
            '| ios.buildNumber =', app.expo.ios.buildNumber,
            '| android.versionCode =', app.expo.android.versionCode);
          EOF
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git add artifacts/flirtfest-mobile/app.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"

      - name: Push commit to branch
        run: git push origin HEAD:"${{ github.ref_name }}"

      - name: Create and push v* tag
        run: |
          TAG="v${{ steps.version.outputs.new }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Pushed tag $TAG — android-build.yml and ios-build.yml will now trigger automatically."

      - name: Summary
        run: |
          echo "Bumped ${{ steps.version.outputs.old }} → ${{ steps.version.outputs.new }}"
          echo "Tag v${{ steps.version.outputs.new }} pushed — iOS and Android builds are starting"
